- name: Install nginx
  hosts: frontend
  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: "nginx={{ nginx_version }}"
        state: present
        update_cache: yes
      become: true


- name: Install Java
  hosts: backend
  tasks:
    - name: Install Java 21
      ansible.builtin.apt:
        name: "openjdk-21-jdk={{ java_version }}"
        state: present
        update_cache: yes
      become: true
